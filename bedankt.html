<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Bedankt · Paul & Tina</title>
  <style>
    :root {
      --cream: #f8ecd0;
      --cream-light: #fff8ea;
      --ink: #16302a;
      --teal: #86d8d5;
      --coral: #ef6b73;
      --white: #ffffff;
      --shadow: 0 18px 40px rgba(22, 48, 42, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(134,216,213,.35), transparent 26%),
        radial-gradient(circle at 92% 18%, rgba(239,107,115,.14), transparent 24%),
        linear-gradient(180deg, var(--cream) 0%, var(--cream-light) 100%);
    }

    .card {
      width: min(720px, 100%);
      background: rgba(255,255,255,.86);
      border: 4px solid var(--ink);
      border-radius: 30px;
      box-shadow: var(--shadow), 8px 8px 0 var(--ink);
      padding: 34px;
      text-align: center;
    }

    .mark {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: var(--teal);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 7vw, 68px);
      line-height: 1;
      letter-spacing: -.04em;
      text-transform: uppercase;
    }

    p {
      margin: 0 auto 18px;
      max-width: 560px;
      color: #27423a;
      font-size: 19px;
      line-height: 1.55;
      font-weight: 650;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 20px;
      border-radius: 999px;
      border: 3px solid var(--ink);
      background: var(--coral);
      color: white;
      box-shadow: 5px 5px 0 var(--ink);
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">♡</div>
    <h1>Dankjewel!</h1>
    <p>Je bericht is goed verzonden naar Laura en Karin.</p>
    <p>We nemen contact met je op als we nog iets nodig hebben.</p>
    <a href="/">Terug naar de website</a>
  </main>
</body>
</html>
